<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ResearchAI — IBM Granite{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#0f62fe"/>
        <path d="M8 16 L14 10 L20 16 L14 22 Z" fill="white" opacity="0.9"/>
        <circle cx="22" cy="10" r="4" fill="white" opacity="0.7"/>
      </svg>
      ResearchAI
      <span class="badge bg-primary ms-1" style="font-size:.65rem">IBM Granite</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='index' %}active{% endif %}" href="/"><i class="bi bi-house me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint in ['chat'] %}active{% endif %}" href="/chat"><i class="bi bi-chat-dots me-1"></i>Chat</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1">
          <i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Online
        </span>
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle theme">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container-fluid px-4 mt-2">
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
